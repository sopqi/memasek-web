{% extends 'base.html' %}
{% block title %}Создать мем{% endblock %}

{% block content %}
<div class="form-container">
    {% if user.is_authenticated %}
        <h2>Загрузить новый мем</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary">Опубликовать</button>
        </form>
    {% else %}
        <div class="error-box">
            <h2>Доступ закрыт</h2>
            <p>Пожалуйста, <a href="{% url 'login' %}">войдите в систему</a>.</p>
        </div>
    {% endif %}
</div>
{% endblock %}
