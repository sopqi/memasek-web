{% extends 'base.html' %}
{% block title %}Регистрация - МемАсЕк{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Зарегистрироваться</button>
    </form>
    <div class="form-links">
        <p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
    </div>
</div>
{% endblock %}
