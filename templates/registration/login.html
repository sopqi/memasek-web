{% extends 'base.html' %}
{% block title %}Вход - МемАсЕк{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Вход на сайт</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Войти</button>
    </form>
    <div class="form-links">
        <a href="{% url 'password_reset' %}">Забыли пароль?</a>
        <a href="{% url 'signup' %}">Регистрация</a>
    </div>
</div>
{% endblock %}
